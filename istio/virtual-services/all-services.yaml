apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: billing-service
  namespace: hotel
spec:
  hosts:
    - billing-service
  http:
    - route:
        - destination:
            host: billing-service
            port:
              number: 8085
---
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: billing-service
  namespace: hotel
spec:
  host: billing-service
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
---
