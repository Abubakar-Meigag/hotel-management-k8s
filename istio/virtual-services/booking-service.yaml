apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: booking-service
  namespace: hotel
spec:
  hosts:
    - booking-service
  http:
    - route:
        - destination:
            host: booking-service
            port:
              number: 8082
---
apiVersion: networking.istio.io/v1alpha3
kind: DestinationRule
metadata:
  name: booking-service
  namespace: hotel
spec:
  host: booking-service
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s