apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hotel-management
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/Abubakar-Meigag/hotel-management-k8s.git
    targetRevision: HEAD
    path: helm/hotel-services
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: hotel
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true

