apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: hotel
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      containers:
        - name: notification-service
          image: hotel-notification-service:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 8086
          env:
            - name: SPRING_RABBITMQ_HOST
              valueFrom:
                configMapKeyRef:
                  name: hotel-config
                  key: SPRING_RABBITMQ_HOST